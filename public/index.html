<!DOCTYPE html>
<html lang="${LANG}">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1, width=device-width, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#e64747" />
    <meta name="apple-mobile-web-app-title" content="MovieMatch" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#e64747" />
    <meta
      name="msapplication-TileImage"
      content="${ROOT_PATH}/assets/icons/ms-icon-144x144.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="57x57"
      href="${ROOT_PATH}/assets/icons/apple-icon-57x57.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="60x60"
      href="${ROOT_PATH}/assets/icons/apple-icon-60x60.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="72x72"
      href="${ROOT_PATH}/assets/icons/apple-icon-72x72.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="76x76"
      href="${ROOT_PATH}/assets/icons/apple-icon-76x76.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="114x114"
      href="${ROOT_PATH}/assets/icons/apple-icon-114x114.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="120x120"
      href="${ROOT_PATH}/assets/icons/apple-icon-120x120.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="144x144"
      href="${ROOT_PATH}/assets/icons/apple-icon-144x144.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="${ROOT_PATH}/assets/icons/apple-icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="${ROOT_PATH}/assets/icons/apple-icon-180x180.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="${ROOT_PATH}/assets/icons/android-icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="${ROOT_PATH}/assets/icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="96x96"
      href="${ROOT_PATH}/assets/icons/favicon-96x96.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="${ROOT_PATH}/assets/icons/favicon-16x16.png"
    />
    <title translate="no">MovieMatch</title>
    <link rel="stylesheet" href="style.css" />
    <script src="js/main.js" type="module" defer></script>
  </head>
  <body
    style="
      --i18n-no-matches: '${MATCHES_SECTION_NO_MATCHES}';
      --i18n-loading: '${RATE_SECTION_LOADING}';
      --i18n-exhausted-cards: '${RATE_SECTION_EXHAUSTED_CARDS}';
    "
    data-i18n-list-conjunction="${LIST_CONJUNCTION}"
    data-i18n-match-likers-template="${MATCHES_SECTION_CARD_LIKERS}"
    data-base-path="${ROOT_PATH}"
  >
    <main class="app">
      <section class="login-section">
        <img
          class="logo"
          src="${ROOT_PATH}/assets/logo.svg"
          alt="MovieMatch Logo"
        />
        <div class="mode-toggle js-mode-toggle">
          <button type="button" class="mode-option is-active" data-mode="join">
            Join Room
          </button>
          <button type="button" class="mode-option" data-mode="create">
            Create Room
          </button>
        </div>
        <form class="login-form js-login-form" name="login" data-mode="join">
          <label for="name">${LOGIN_NAME}</label>
          <input type="text" name="name" autocomplete="given-name" />
          <div class="join-only js-join-only">
            <label for="room-code">${LOGIN_ROOM_CODE}</label>
            <input type="text" name="roomCode" pattern="[0-9A-Za-z]{4}" autocomplete="off" />
          </div>
          <div class="create-only js-create-only">
            <label>Libraries</label>
            <div class="library-list js-library-list">
              <p class="field-hint js-library-loading">Loading libraries…</p>
            </div>
            <div class="age-range">
              <div class="age-field">
                <label for="min-age">Minimum age</label>
                <select id="min-age" name="minAge" class="select-input js-min-age">
                  <option value="">No limit</option>
                </select>
              </div>
              <div class="age-field">
                <label for="max-age">Maximum age</label>
                <select id="max-age" name="maxAge" class="select-input js-max-age">
                  <option value="">No limit</option>
                </select>
              </div>
            </div>
            <label class="checkbox-row">
              <input type="checkbox" name="includeUnrated" class="js-include-unrated" />
              <span>Include unrated movies</span>
            </label>
          </div>
          <p class="login-error js-login-error" hidden></p>
          <button type="submit" class="submit-button js-submit">Join</button>
        </form>
      </section>
      <section class="rate-section" hidden>
        <div class="card-stack js-card-stack"></div>
        <div class="rate-controls">
          <button type="button" class="rate-thumbs-down">👎</button>
          <button type="button" class="rate-thumbs-up">👍</button>
        </div>
      </section>
      <section
        class="matches-section js-matches-section"
        hidden
        data-target-type="${CONFIG_MATCHES_TARGET_TYPE}"
      >
        <div class="room-bar js-room-bar">
          <svg class="room-bar-svg" preserveAspectRatio="none" aria-hidden="true">
            <path class="js-room-bar-path" d="" />
          </svg>
          <button type="button" class="room-bulb-label room-bulb-label--left js-room-code" title="Copy room code">
            <span class="room-bulb-text">Room ID:&nbsp;<span class="js-room-code-text"></span></span>
          </button>
          <button type="button" class="room-bulb-label room-bulb-label--right js-occupancy-toggle" title="Who's in the room">
            <span class="room-bulb-text">Occupancy&nbsp;-&nbsp;<span class="js-occupancy-count">1</span></span>
          </button>
        </div>
        <ul class="occupancy-list js-occupancy-list" hidden></ul>
        <p class="matches-title">
          <span class="matches-count js-matches-count" data-count="0"></span>
          ${MATCHES_SECTION_TITLE}
        </p>
        <ul class="matches-list js-matches-list"></ul>
      </section>
    </main>
    <footer>
      <p>MovieMatch ${VERSION}</p>
    </footer>
  </body>
</html>
